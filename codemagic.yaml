workflows:
  android-tv:
    name: Building and deploying android TV application
    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
      cancel_previous_builds: true

    environment:
      flutter: 3.13.9
      vars:
        PACKAGE_NAME: "com.mawaqit.androidtv"
        GOOGLE_PLAY_TRACK: internal

      android_signing:
        - debug: true    
          jks_build_type: release  
          in_memory: true  

      groups:
        - google_credentials
        - aws_credentials
        - GITHUB
        - APP

    scripts:
      - name: Set up keystore
        script: |
          echo "Generating debug keystore..."
          keytool -genkeypair \
            -alias upload \
            -keyalg RSA \
            -keysize 2048 \
            -validity 9125 \
            -keystore $CM_KEYSTORE_PATH \
            -storepass $CM_KEYSTORE_PASSWORD \
            -keypass $CM_KEY_PASSWORD \
            -dname "CN=Mawaqit,O=Mawaqit,L=Unknown,C=US"
          
          echo "keystore_path=$CM_KEYSTORE_PATH" >> $CM_ENV
          echo "key_alias=upload" >> $CM_ENV
          echo "key_password=$CM_KEY_PASSWORD" >> $CM_ENV
          echo "store_password=$CM_KEYSTORE_PASSWORD" >> $CM_ENV

      - name: Retrieve version
        script: |
          VERSION=$(cat "pubspec.yaml" | sed -nE 's/version:.*([0-9]+\.[0-9]+\.[0-9])(-tv)?\+.*/\1/p')
          BUILD_NUMBER=$(($(google-play get-latest-build-number --package-name "$PACKAGE_NAME" --tracks="$GOOGLE_PLAY_TRACK") + 1))
          echo "VERSION=1.22.0" >> $CM_ENV
          echo "BUILD_NUMBER=3" >> $CM_ENV

      - name: Debug Environment Variables
        script: |
          echo "MAWAQIT_API_KEY: $MAWAQIT_API_KEY"
          echo "MAWAQIT_SENTRY_DNS: $MAWAQIT_SENTRY_DNS"
          echo "VERSION: $VERSION"
          echo "BUILD_NUMBER: $BUILD_NUMBER"

      - name: Test version
        script: |
          echo "App version: $VERSION"
          echo "BUILD NUMBER: $BUILD_NUMBER"

          if [ -z ${VERSION} ]; then
           echo "Version is empty, will not build"
           exit 1
          fi
          if [ -z ${BUILD_NUMBER} ]; then
           echo "BUILD NUMBER is empty, will not build"
           exit 1
          fi

      - name: Install dependencies
        script: |
          flutter pub get
          dart run build_runner build

      - name: Run flutter Unit tests
        script: |
          mkdir -p test-results
          flutter test  \
            --dart-define mawaqit.api.key=$MAWAQIT_API_KEY  \
            --dart-define mawaqit.sentry.dns=$MAWAQIT_SENTRY_DNS \
          > test-results/results.json



      - name: Build APK with Flutter
        script: |
          flutter build apk --release

      - name: Copy artifacts
        script: |
          mkdir build/artifacts;
          cp build/app/outputs/bundle/release/app-release.aab build/artifacts/MAWAQIT-For-TV-v$VERSION-$BUILD_NUMBER.aab
          cp build/app/outputs/flutter-apk/app-release.apk build/artifacts/MAWAQIT-For-TV-v$VERSION-$BUILD_NUMBER.apk

      - name: Upload to AWS S3 bucket
        script: |
          aws s3 cp build/artifacts/MAWAQIT-For-TV-v$VERSION-$BUILD_NUMBER.apk s3://cdn.mawaqit.net/android/tv/apk/

      - name: Upload apk to the Github release
        script: |
          if [ -z ${CM_TAG} ]; then
           echo "Not a tag build, will not upload apk"
           exit 0
          fi

          gh release upload "${CM_TAG}" build/artifacts/MAWAQIT-For-TV-v$VERSION-$BUILD_NUMBER.apk

    artifacts:
      - build/artifacts/*
      - build/**/outputs/**/mapping.txt
      - flutter_drive.log
      - test-results/*

