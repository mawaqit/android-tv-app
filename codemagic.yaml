workflows:
  android-tv:
    name: Building and deploying android TV application
    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
      cancel_previous_builds: true

    environment:
      flutter: 3.13.9
      vars:
        PACKAGE_NAME: "com.mawaqit.androidtv"
        GOOGLE_PLAY_TRACK: internal
        JAVA_TOOL_OPTIONS: "-Xmx4g"  # Prevent memory issues [8]

      android_signing:
        - Mawaqit Mobile App + Android TV Android keystore

      groups:
        - google_credentials
        - aws_credentials
        - GITHUB
        - APP

    cache:
      cache_paths:
        - $FLUTTER_ROOT-$FLUTTER_VERSION/.pub-cache  # Version-specific isolation [4]
        - $HOME/.gradle-$FLUTTER_VERSION/caches  # Prevent cross-version contamination
    scripts:
      - name: Environment Reset
        script: |
          flutter clean
          rm -rf android/.gradle
          rm -rf android/build
          rm -rf $HOME/.gradle/caches
          rm -rf .dart_tool
          find . -name "Podfile.lock" -delete  # Additional iOS cleanup [3]
          find . -name "*.lock" -delete
          flutter pub cache repair  # Fix corrupted dependencies [4]
#          ./gradlew clean  # Full Gradle cleanup [8]

      - name: Version Management
        script: |
          VERSION=$(sed -nE 's/version: ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' pubspec.yaml)
          LAST_BUILD=$(google-play get-latest-build-number --package-name "$PACKAGE_NAME" --tracks="$GOOGLE_PLAY_TRACK")
          BUILD_NUMBER=$((LAST_BUILD + 1))

          # Reset build number for previous versions
          if git show HEAD:pubspec.yaml | grep -q "version: $VERSION"; then
            BUILD_NUMBER=$LAST_BUILD
          fi

          echo "VERSION=$VERSION" >> $CM_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV

      - name: Dependency Isolation
        script: |
          flutter pub get --no-update  # Prevent implicit upgrades [7]
          flutter pub outdated --mode=null-safety
          dart run build_runner build --delete-conflicting-outputs

      - name: Build Artifacts
        script: |
          # Sequential building to prevent conflicts [7]
          flutter build appbundle --release \
            --build-name=$VERSION \
            --build-number=$BUILD_NUMBER \
            --dart-define mawaqit.sentry.dns=$MAWAQIT_SENTRY_DNS \
            --dart-define mawaqit.api.key=$MAWAQIT_API_KEY

          # Clean intermediate files between builds
          rm -rf build/app/intermediates

          flutter build apk --release \
            --build-name=$VERSION \
            --build-number=$BUILD_NUMBER \
            --dart-define mawaqit.sentry.dns=$MAWAQIT_SENTRY_DNS \
            --dart-define mawaqit.api.key=$MAWAQIT_API_KEY

    artifacts:
      - build/artifacts/*
      - build/**/outputs/**/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: $GOOGLE_PLAY_TRACK
